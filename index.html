<!DOCTYPE html>
<html>

<head>

<title>Future Tech Lab</title>

<style>

/* PAGE */

body{
font-family: Arial;
margin:0;
text-align:center;
background: linear-gradient(to bottom,#020617,#0f172a,#1e293b);
color:white;
}

img {
    width:100%;
    border-radius:10px;

}


/* NAVBAR */

#nav{

background: linear-gradient(to bottom,#020617,#020617);

padding:22px;

border-bottom:2px solid rgba(255,255,255,0.1);

}



.nav-item{

display:inline-block;

margin:0 20px;

padding:8px 18px;

font-weight:bold;

border-radius:6px;

}



.nav-item:hover{

background-color:rgba(255,255,255,0.12);
cursor: pointer;

}



/* HERO */

#hero{

margin:70px 20px;

}



h1{

font-size:50px;

margin:0 0 10px;

}



p{

font-size:20px;

color:rgba(255,255,255,0.8);

}



/* CARD AREA */

#projects{

width:100%;

margin-top:40px;

}



/* CARDS */

.card{

display:inline-block;

width:250px;

aspect-ratio:3/4;

padding:20px;

margin:18px;

background: linear-gradient(to bottom,#111827,#1f2937);

border:1px solid rgba(255,255,255,0.15);

border-radius:14px;

box-shadow:0 12px 28px rgba(0,0,0,0.45);

text-align:center;

}



/* CARD HOVER */

.card:hover{

box-shadow:0 20px 45px rgba(0,0,0,0.7);
cursor: pointer;

}



/* CARD TEXT */

.card h2{

font-size:22px;

margin:10px 0;

}



.card p{

font-size:16px;

color:rgba(255,255,255,0.7);

}



/* BUTTON */

.button{

margin:15px;

padding:10px;

border-radius:8px;

background: linear-gradient(to bottom,#22d3ee,#2563eb);

font-weight:bold;

}



/* FOOTER */

footer{

margin-top:80px;

padding:30px;

background: linear-gradient(to bottom,#020617,#000);

font-size:14px;

color:rgba(255,255,255,0.7);

}

</style>

</head>



<body>



<!-- NAV -->

<div id="nav">

<span class="nav-item">Home</span>

<span class="nav-item">Projects</span>

<span class="nav-item">Games</span>

<span class="nav-item">Contact</span>

</div>



<!-- HERO -->

<div id="hero">

<h1>Future Tech Lab</h1>

<p>Games and apps built with code</p>

</div>



<!-- CARDS -->

<div id="projects">



<div class="card">
    <img src="https://rbscode.com/Student-Portal/images/30.png" alt="treasure-chest">
  

<h2>Coin Clicker</h2>

<p>Build a money empire by clicking coins.</p>

<div class="button">Launch</div>

</div>



<div class="card">
    <img src="https://rbscode.com/Student-Portal/images/31.png" alt="star-catcher">

<h2>Catch The Star</h2>

<p>Move the basket and catch falling apples.</p>

<div class="button">Launch</div>

</div>



<div class="card">
    <img src="https://rbscode.com/Student-Portal/images/32.png" alt="space-shooter-game-screenshot">


<h2>Space Shooter</h2>

<p>Defeat alien ships and save the galaxy.</p>

<div class="button">Launch</div>

</div>



</div>



<footer>

© Future Tech Lab

</footer>



</body>

</html>
